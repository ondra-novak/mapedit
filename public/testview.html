<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>SVG Prohlížeč s centrováním</title>
  <style>
    #svg-container {
      width: 800px;
      height: 600px;
      border: 1px solid #ccc;
      overflow: auto;
      position: relative;
    }

    #svg-inner {
      position: relative;
      width: 3000px;
      height: 3000px;
    }

    #svg-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      display: inline-block;
    }

    svg {
      display: block;
    }

    .controls {
      margin: 10px 0;
    }
  </style>
</head>
<body>

<div class="controls">
  <button onclick="resetView()">Reset</button>
  <button onclick="centerView()">Center</button>
  <button onclick="setZoom(currentZoom + 0.1)">Zoom +</button>
  <button onclick="setZoom(currentZoom - 0.1)">Zoom -</button>
</div>

<div id="svg-container">
  <div id="svg-inner">
    <div id="svg-wrapper">
      <svg id="svg-root" xmlns="http://www.w3.org/2000/svg" width="1000" height="1000">
        <!-- Ukázkový obsah -->
        <rect x="100" y="100" width="200" height="200" fill="skyblue" />
        <circle cx="500" cy="500" r="100" fill="tomato" />
        <text x="150" y="400" font-size="24">Test SVG</text>
      </svg>
    </div>
  </div>
</div>

<script>
  const container = document.getElementById('svg-container');
  const wrapper = document.getElementById('svg-wrapper');
  const svg = document.getElementById('svg-root');

  let currentZoom = 1;

  function setZoom(zoom) {
    currentZoom = Math.max(0.1, zoom);
    wrapper.style.transform = `scale(${currentZoom})`;
  }

  function resetView() {
    setZoom(1);
    container.scrollLeft = 0;
    container.scrollTop = 0;
  }

  function centerView() {
    const bbox = svg.getBBox(); // fyzický bounding box obsahu SVG
    const centerX = bbox.x + bbox.width / 2;
    const centerY = bbox.y + bbox.height / 2;

    const zoomedX = centerX * currentZoom;
    const zoomedY = centerY * currentZoom;

    const wrapperOffsetLeft = wrapper.offsetLeft;
    const wrapperOffsetTop = wrapper.offsetTop;

    const scrollX = zoomedX + wrapperOffsetLeft - container.clientWidth / 2;
    const scrollY = zoomedY + wrapperOffsetTop - container.clientHeight / 2;

    container.scrollLeft = scrollX;
    container.scrollTop = scrollY;
  }

  container.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.1 : -0.1;
      setZoom(currentZoom + delta);
    }
  }, { passive: false });

  // Inicializace
  resetView();
</script>

</body>
</html>
