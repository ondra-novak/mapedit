<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PCX Viewer</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        #canvas { border: 1px solid #ccc; display: block; margin-top: 1em; }
    </style>
</head>
<body>
<input type="file" id="upload" accept=".pcx" />
<canvas id="canvas"></canvas>

<script>
document.getElementById('upload').addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        const buffer = new Uint8Array(reader.result);
        const imageData = parsePCX(buffer, 1); // Změňte na 2 pro profil 2
        drawToCanvas(imageData);
    };
    reader.readAsArrayBuffer(file);
});

function parsePCX(buffer, profile = 1) {
    if (buffer[0] !== 0x0A || buffer[1] !== 5 || buffer[2] !== 1 || buffer[3] !== 8) {
        throw new Error("Nepodporovaný nebo nevalidní PCX formát");
    }

    const xmin = buffer[4] + (buffer[5] << 8);
    const ymin = buffer[6] + (buffer[7] << 8);
    const xmax = buffer[8] + (buffer[9] << 8);
    const ymax = buffer[10] + (buffer[11] << 8);

    const width = xmax - xmin + 1;
    const height = ymax - ymin + 1;

    // Hledání palety na konci souboru
    const paletteMarker = buffer[buffer.length - 769];
    if (paletteMarker !== 0x0C) {
        throw new Error("Chybějící VGA paleta");
    }

    const palette = [];
    for (let i = 0; i < 256; i++) {
        const r = buffer[buffer.length - 768 + i * 3];
        const g = buffer[buffer.length - 768 + i * 3 + 1];
        const b = buffer[buffer.length - 768 + i * 3 + 2];
        palette.push([r, g, b]);
    }

    // Načtení RLE bitmapy (jen 1 bitplane)
    const bytesPerLine = buffer[66] + (buffer[67] << 8);
    const image = new Uint8Array(width * height);

    let ptr = 128; // Data začínají zde
    let i = 0;
    for (let y = 0; y < height; y++) {
        let x = 0;
        while (x < bytesPerLine && ptr < buffer.length - 769) {
            let val = buffer[ptr++];
            let count;
            if ((val & 0xC0) === 0xC0) {
                count = val & 0x3F;
                val = buffer[ptr++];
            } else {
                count = 1;
            }

            for (let c = 0; c < count && x < width; c++) {
                if (x < width) {
                    image[i++] = val;
                }
                x++;
            }
        }
    }

    // Vytvoření RGBA dat
    const rgba = new Uint8ClampedArray(width * height * 4);
    for (let j = 0; j < image.length; j++) {
        const index = image[j];
        let [r, g, b] = palette[index];        
        let a = 255;

        if (profile === 1) {
            if (index === 0) a = 0;
            else if (index === 1) [r, g, b, a] = [0, 0, 0, 128];
        } else if (profile === 2) {
            a = index < 128 ? 255 : 128;
        }

        rgba.set([r, g, b, a], j * 4);
    }

    return { width, height, data: rgba };
}

function drawToCanvas({ width, height, data }) {
    const canvas = document.getElementById('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    const imageData = new ImageData(data, width, height);
    ctx.putImageData(imageData, 0, 0);
}
</script>
</body>
</html>
